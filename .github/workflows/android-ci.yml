name: Android CI

on:
  push:
    branches: [main, 'feat/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant gradlew
        run: chmod +x gradlew

      - name: Download MNN native (arm64 + armv7)
        run: |
          ./gradlew :local-llm-core:downloadMnnNative --no-daemon --stacktrace
          test -f local-llm-core/src/main/jniLibs/arm64-v8a/libllm.so
          test -f local-llm-core/src/main/jniLibs/arm64-v8a/libMNN.so
          test -f local-llm-core/src/main/jniLibs/armeabi-v7a/libllm.so
          test -f local-llm-core/src/main/jniLibs/armeabi-v7a/libMNN.so
          ls -lh local-llm-core/src/main/jniLibs/arm64-v8a/ | head -20

      - name: Download sherpa-onnx AAR
        run: |
          ./gradlew :voice:downloadSherpaOnnxAar --no-daemon --stacktrace
          test -f voice/libs/sherpa-onnx-static-link-onnxruntime-1.13.4.aar
          ls -lh voice/libs/

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Verify all engines packaged in APK
        run: |
          set -euo pipefail
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          echo "APK=$APK size=$(stat -c%s "$APK")"
          unzip -l "$APK" | tee /tmp/apk-list.txt | head -5
          # Sherpa ASR/TTS JNI + onnxruntime
          grep -E 'lib/[^/]+/libsherpa-onnx-jni\.so' /tmp/apk-list.txt
          grep -E 'lib/[^/]+/libonnxruntime\.so' /tmp/apk-list.txt || \
            echo "WARN: libonnxruntime may be static-linked into sherpa jni"
          # MNN LLM stack
          grep -E 'lib/[^/]+/libMNN\.so' /tmp/apk-list.txt
          grep -E 'lib/[^/]+/libllm\.so' /tmp/apk-list.txt
          grep -E 'lib/[^/]+/libMNN_Express\.so' /tmp/apk-list.txt
          # our JNI wrapper (CMake target: mnn_lanxin)
          grep -E 'lib/[^/]+/libmnn_lanxin\.so' /tmp/apk-list.txt
          # Live2D placeholder assets
          grep -q 'assets/live2d/index.html' /tmp/apk-list.txt
          echo "OK: MNN + sherpa + live2d assets present in APK"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
