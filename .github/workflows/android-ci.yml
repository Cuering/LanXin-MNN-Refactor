name: Android CI

on:
  push:
    branches: [main, 'feat/**', 'refactor/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Grant gradlew
        run: chmod +x gradlew

      - name: Download MNN native (arm64 + armv7)
        run: |
          ./gradlew :local-llm-core:downloadMnnNative --no-daemon --stacktrace
          test -f local-llm-core/src/main/jniLibs/arm64-v8a/libllm.so
          test -f local-llm-core/src/main/jniLibs/arm64-v8a/libMNN.so
          test -f local-llm-core/src/main/jniLibs/armeabi-v7a/libllm.so
          test -f local-llm-core/src/main/jniLibs/armeabi-v7a/libMNN.so
          ls -lh local-llm-core/src/main/jniLibs/arm64-v8a/ | head -20

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
